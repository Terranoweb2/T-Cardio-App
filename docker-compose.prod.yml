version: '3.8'

services:
  # ==================== DATABASE ====================
  postgres:
    image: postgres:15-alpine
    container_name: tcardio-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tcardio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tcardio_pro}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tcardio} -d ${POSTGRES_DB:-tcardio_pro}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tcardio-net

  # ==================== CACHE ====================
  redis:
    image: redis:7-alpine
    container_name: tcardio-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - tcardio-net

  # ==================== STORAGE ====================
  minio:
    image: minio/minio:latest
    container_name: tcardio-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - tcardio-net

  # ==================== BACKEND API ====================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tcardio-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-tcardio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tcardio_pro}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 365d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 365d
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: deepseek-chat
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      OPENAI_VISION_API_KEY: ${OPENAI_VISION_API_KEY}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o-mini}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: tcardio-reports
      MINIO_USE_SSL: "false"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENABLE_AI_ANALYSIS: "true"
      ENABLE_EMERGENCY_ALERTS: "true"
      ENABLE_TELECONSULTATION: "true"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@tcardio.pro}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:tcardio.health@gmail.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tcardio-net

  # ==================== FRONTEND WEB ====================
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: tcardio-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - tcardio-net

  # ==================== REVERSE PROXY ====================
  nginx:
    image: nginx:alpine
    container_name: tcardio-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - /opt/tcardio/apk-downloads:/opt/tcardio/apk-downloads:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tcardio-net

  # ==================== SSL CERTS ====================
  certbot:
    image: certbot/certbot
    container_name: tcardio-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  tcardio-net:
    driver: bridge
