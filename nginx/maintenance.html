<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Cardio Pro - Maintenance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a1628;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e2e8f0;
      overflow: hidden;
    }

    /* Animated background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(6, 182, 212, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(20, 184, 166, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 10% 60%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
      z-index: 0;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(6, 182, 212, 0.3);
      border-radius: 50%;
      animation: float linear infinite;
    }
    .particle:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; }
    .particle:nth-child(2) { left: 25%; animation-duration: 15s; animation-delay: 2s; width: 3px; height: 3px; }
    .particle:nth-child(3) { left: 40%; animation-duration: 10s; animation-delay: 4s; }
    .particle:nth-child(4) { left: 55%; animation-duration: 18s; animation-delay: 1s; width: 5px; height: 5px; }
    .particle:nth-child(5) { left: 70%; animation-duration: 14s; animation-delay: 3s; width: 3px; height: 3px; }
    .particle:nth-child(6) { left: 85%; animation-duration: 11s; animation-delay: 5s; }
    .particle:nth-child(7) { left: 50%; animation-duration: 16s; animation-delay: 6s; width: 2px; height: 2px; }
    .particle:nth-child(8) { left: 15%; animation-duration: 13s; animation-delay: 7s; width: 6px; height: 6px; opacity: 0.15; }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
    }

    /* Heartbeat icon */
    .icon-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .pulse-ring {
      position: absolute;
      width: 100px;
      height: 100px;
      border: 2px solid rgba(6, 182, 212, 0.2);
      border-radius: 50%;
      animation: pulse-ring 2.5s ease-out infinite;
    }
    .pulse-ring:nth-child(2) { animation-delay: 0.8s; }

    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    .icon-circle {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(20, 184, 166, 0.1));
      border: 1px solid rgba(6, 182, 212, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .heartbeat-svg {
      width: 44px;
      height: 44px;
      color: #06b6d4;
      animation: heartbeat 2s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.15); }
      30% { transform: scale(1); }
      45% { transform: scale(1.1); }
      60% { transform: scale(1); }
    }

    /* Logo text */
    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #06b6d4, #14b8a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .description {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    /* Status card */
    .status-card {
      background: rgba(6, 182, 212, 0.06);
      border: 1px solid rgba(6, 182, 212, 0.15);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(8px);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #f59e0b;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-text {
      font-size: 0.85rem;
      color: #f59e0b;
      font-weight: 500;
    }

    /* Progress bar */
    .progress-bar {
      height: 3px;
      background: rgba(6, 182, 212, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 0.75rem;
    }

    .progress-fill {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #06b6d4, #14b8a6);
      border-radius: 3px;
      animation: progress 2.5s ease-in-out infinite;
    }

    @keyframes progress {
      0% { width: 10%; margin-left: 0; }
      50% { width: 40%; margin-left: 30%; }
      100% { width: 10%; margin-left: 90%; }
    }

    .footer {
      font-size: 0.75rem;
      color: #475569;
    }

    /* ECG line animation */
    .ecg-line {
      position: fixed;
      bottom: 15%;
      left: 0;
      width: 200%;
      height: 60px;
      z-index: 0;
      opacity: 0.08;
      animation: ecg-scroll 4s linear infinite;
    }

    @keyframes ecg-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>

  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- ECG line -->
  <svg class="ecg-line" viewBox="0 0 1200 60" preserveAspectRatio="none">
    <polyline
      fill="none"
      stroke="#06b6d4"
      stroke-width="2"
      points="0,30 80,30 100,30 110,10 120,50 130,5 140,55 150,30 170,30 250,30 280,30 290,10 300,50 310,5 320,55 330,30 350,30 430,30 480,30 490,10 500,50 510,5 520,55 530,30 550,30 600,30"
    />
    <polyline
      fill="none"
      stroke="#06b6d4"
      stroke-width="2"
      points="600,30 680,30 700,30 710,10 720,50 730,5 740,55 750,30 770,30 850,30 880,30 890,10 900,50 910,5 920,55 930,30 950,30 1030,30 1080,30 1090,10 1100,50 1110,5 1120,55 1130,30 1150,30 1200,30"
    />
  </svg>

  <div class="container">
    <div class="icon-wrapper">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="icon-circle">
        <svg class="heartbeat-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          <path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/>
        </svg>
      </div>
    </div>

    <div class="logo">T-Cardio Pro</div>

    <h1>Service temporairement indisponible</h1>

    <p class="description">
      Notre plateforme est en cours de maintenance pour vous offrir une meilleure experience. Nous serons de retour tres bientot.
    </p>

    <div class="status-card">
      <div class="status-row">
        <div class="status-dot"></div>
        <span class="status-text">Maintenance en cours</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <p class="footer">Merci de votre patience et de votre confiance.</p>
  </div>
</body>
</html>
