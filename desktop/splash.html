<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Cardio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #0f2137 50%, #0d1e30 100%);
      border-radius: 16px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-app-region: drag;
    }
    .splash-container {
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }
    .logo-container {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, #06b6d4 0%, #0d9488 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(6, 182, 212, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    .logo-icon {
      font-size: 48px;
      line-height: 1;
    }
    .app-name {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #06b6d4, #0d9488);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    .app-sub {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .loader {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #06b6d4;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    .dot:nth-child(3) { animation-delay: 0; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(6, 182, 212, 0.3); }
      50% { box-shadow: 0 8px 48px rgba(6, 182, 212, 0.5); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo-container">
      <span class="logo-icon">&#x1F3E5;</span>
    </div>
    <div class="app-name">T-Cardio</div>
    <div class="app-sub">Espace Medecin</div>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
