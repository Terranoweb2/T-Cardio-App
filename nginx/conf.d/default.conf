# Upstream definitions
upstream backend_api {
    server backend:3001;
}

upstream frontend_app {
    server frontend:3000;
}

# HTTP server (Cloudflare Tunnel handles SSL termination)
server {
    listen 80;
    server_name t-cardio.org;

    # Custom error pages
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Certbot ACME challenge (for future use)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API Backend
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # WebSocket - Emergency namespace (regex to not capture /emergencies frontend page)
    location ~ ^/emergency(?:/|$) {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # WebSocket - Teleconsultation namespace (regex to not capture /teleconsultations frontend page)
    location ~ ^/teleconsultation(?:/|$) {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # Socket.io polling fallback
    location /socket.io/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # Login rate limiting
    location /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # APK Downloads (via /downloads/ path)
    location /downloads/ {
        alias /opt/tcardio/apk-downloads/;
        autoindex off;
        types { application/vnd.android.package-archive apk; }
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment';
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # APK Direct Downloads (root path /T-Cardio-*.apk)
    location ~ ^/T-Cardio-.*\.apk$ {
        root /opt/tcardio/apk-downloads;
        types { application/vnd.android.package-archive apk; }
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment';
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # EXE Direct Downloads (T-Cardio-*.exe)
    location ~ ^/(T-Cardio-.*\.exe)$ {
        alias /opt/tcardio/apk-downloads/$1;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Next.js data/RSC requests — never cache (ensures fresh page data)
    location /_next/data {
        proxy_pass http://frontend_app;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Static assets caching (JS/CSS/images with content hash in filename)
    location /_next/static {
        proxy_pass http://frontend_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Frontend (catch-all) — HTML pages must NOT be cached
    # This ensures WebView always fetches fresh HTML that references the latest JS chunks
    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Critical for WebView/APK: force no-cache on HTML pages
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
